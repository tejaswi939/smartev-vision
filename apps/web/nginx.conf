server {
  listen 80;
  server_name _;

  # API proxy. The upstream host is resolved LAZILY (at request time) by using a variable in
  # proxy_pass together with a resolver — so nginx still boots when the api is not yet in DNS
  # (e.g. all services start together on a Render Blueprint). A literal proxy_pass resolves the
  # host at startup and aborts with "[emerg] host not found in upstream".
  #
  # ${NGINX_RESOLVER} (platform DNS, from /etc/resolv.conf) and ${API_UPSTREAM} (api host:port)
  # are filled in by envsubst before nginx starts. $api_upstream / $host / $scheme stay as nginx
  # runtime variables (envsubst only replaces names that exist in the environment).
  location /api/ {
    resolver ${NGINX_RESOLVER} valid=10s ipv6=off;
    set $api_upstream ${API_UPSTREAM};
    proxy_pass http://$api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Content-hashed build assets: cache hard, but 404 when a hash is missing.
  # Do NOT fall back to index.html here — returning HTML for a stale *.js chunk makes the
  # browser execute HTML as JS and breaks code-split (lazy) routes after a redeploy.
  location /assets/ {
    root /usr/share/nginx/html;
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA entry: serve index.html for app routes, and never cache it so a returning browser
  # always gets the current asset hashes after a redeploy.
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
    add_header Cache-Control "no-cache";
  }
}
