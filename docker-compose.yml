services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sev
      POSTGRES_PASSWORD: sev
      POSTGRES_DB: smartev
    ports: ["5544:5432"]   # host 5544 -> container 5432 (avoids native Postgres on 5432)
    volumes: ["sev_pgdata:/var/lib/postgresql/data"]
volumes:
  sev_pgdata:
